<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/tokens.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — New Consensus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --border-mid: rgba(255,255,255,0.14);
      --text-mid: #888880;
      --yellow: #d4c84a;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: #e0e0dc; font-family: var(--mono); font-size: 14px; line-height: 1.7; overflow-x: hidden; }
    main.page-wrap { position: relative; z-index: 1; padding-top: 72px; }
    @keyframes up { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

    .hero { padding: 80px 64px 64px; border-bottom: 1px solid var(--border-mid); display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: end; }
    .hero-kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.3em; color: var(--yellow); text-transform: uppercase; margin-bottom: 20px; opacity:0; animation: up 0.6s 0.1s forwards; }
    .hero-title { font-family: var(--sans); font-size: clamp(3rem,6vw,6rem); font-weight: 900; line-height: 0.95; color: #fff; letter-spacing: -0.03em; opacity:0; animation: up 0.7s 0.2s forwards; }
    .hero-right { opacity:0; animation: up 0.7s 0.35s forwards; }
    .hero-desc { font-size: 15px; color: var(--text-mid); line-height: 1.85; max-width: 480px; }

    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; gap: 32px; padding: 60px 24px 48px; }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main class="page-wrap">
    <section class="hero">
      <div class="hero-left">
        <div class="hero-kicker">dispatches</div>
        <h1 class="hero-title">The<br>Blog</h1>
      </div>
      <div class="hero-right">
        <div class="hero-desc">
          <p>Content coming soon.</p>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="/shared-layout.js"></script>
</body>
</html>
