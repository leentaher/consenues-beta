<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/tokens.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact — New Consensus</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>	<style>

    .hero {
      padding: 130px 40px 24px;
    }

    .hero h1 {
      font-size: clamp(38px, 8vw, 68px);
      line-height: 1.05;
      margin-bottom: 18px;
      letter-spacing: -0.03em;
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--red-300);
      text-transform: lowercase;
      margin-bottom: 14px;
    }

    .body {
      max-width: 760px;
      color: var(--gray-300);
      line-height: 1.8;
    }

    .contact-list {
      display: grid;
      gap: 18px;
      max-width: 760px;
      margin-top: 32px;
    }

    .contact-list a {
      color: var(--red-300);
      font-family: var(--font-mono);
      font-size: 15px;
      transition: color var(--transition-fast);
    }

    .contact-list a:hover {
      color: var(--red-400);
    }

    @media (max-width: 768px) {
      .hero { padding: 100px 24px 24px; }
    }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="scan-bar"></div>
	<div id="site-header"></div>
	<section class="hero"><p class="eyebrow">get in touch</p><h1>we actually respond</h1><p class="body">Questions? Want to collaborate?</p></section>
	<section class="section"><div class="contact-list"><div>General inquiries: <a href="mailto:info@newconsensus.com">info@newconsensus.com</a></div><div>Press / Media: <a href="mailto:press@newconsensus.com">press@newconsensus.com</a></div><div>Zack directly: <a href="mailto:zack@newconsensus.com">zack@newconsensus.com</a> <span class="muted">(he asked to be included)</span></div></div></section>
	<div id="site-footer"></div>
	<div class="glitch-overlay" id="glitchOverlay"><button onclick="closeGlitch()">close</button><div id="bigCountdown">1,018</div></div>
	<script>
		function getDaysRemaining(){const i=new Date('2029-01-20');i.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return Math.ceil((i-t)/(1000*60*60*24));}
		function updateCountdownDisplays(){const d=getDaysRemaining().toLocaleString();const a=document.getElementById('daysLeft');const b=document.getElementById('bigCountdown');if(a)a.textContent=d+' days';if(b)b.textContent=d;}
		function triggerPanic(){document.getElementById('glitchOverlay').classList.add('active');document.body.style.overflow='hidden';}
		function closeGlitch(){document.getElementById('glitchOverlay').classList.remove('active');document.body.style.overflow='';}
		updateCountdownDisplays();setInterval(updateCountdownDisplays,60000);

		document.addEventListener('keydown', function(e){if(e.key==='Escape') closeGlitch();});

		(function setupNavDropdown(){
			const dropdowns=document.querySelectorAll('.nav-dropdown');if(!dropdowns.length) return;
			function isMobile(){return window.innerWidth<=768;}
			function setOpen(dropdown,open){const trigger=dropdown.querySelector('.nav-dropdown-trigger');dropdown.classList.toggle('open',open);if(open){dropdown.setAttribute('open','');}else{dropdown.removeAttribute('open');}if(trigger){trigger.setAttribute('aria-expanded',open?'true':'false');}}
			function closeAll(){dropdowns.forEach((dropdown)=>setOpen(dropdown,false));}
			dropdowns.forEach((dropdown)=>{const trigger=dropdown.querySelector('.nav-dropdown-trigger');if(!trigger) return;trigger.addEventListener('click',(e)=>{if(isMobile()){e.preventDefault();setOpen(dropdown,!dropdown.classList.contains('open'));}});trigger.addEventListener('keydown',(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setOpen(dropdown,!dropdown.classList.contains('open'));}if(e.key==='Escape'){setOpen(dropdown,false);trigger.blur();}});dropdown.addEventListener('mouseenter',()=>{if(!isMobile()) setOpen(dropdown,true);});dropdown.addEventListener('mouseleave',()=>{if(!isMobile()) setOpen(dropdown,false);});dropdown.addEventListener('focusout',(e)=>{if(!dropdown.contains(e.relatedTarget)){setOpen(dropdown,false);}});});
			document.addEventListener('click',(e)=>{if(!e.target.closest('.nav-dropdown')){closeAll();}});
			document.addEventListener('keydown',(e)=>{if(e.key==='Escape') closeAll();});
		})();
	</script>
  <script src="/shared-layout.js"></script>
</body>
</html>
