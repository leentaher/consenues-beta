<!DOCTYPE html>

<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;--font-mono:'JetBrains Mono','SF Mono',Consolas,monospace;--black:#0a0a0a;--gray-900:#111;--gray-800:#1a1a1a;--gray-500:#505050;--gray-300:#909090;--gray-100:#e0e0e0;--white:#fff;--violet:#c4b5fd;--red-500:#ff2020;--red-400:#ff5252}
    body{font-family:var(--font-sans);background:var(--black);color:var(--gray-100);line-height:1.6}
    a{color:inherit;text-decoration:none}
    .hero{padding:130px 40px 24px;max-width:980px}
    .eyebrow{font-family:var(--font-mono);font-size:14px;color:var(--violet);text-transform:lowercase;margin-bottom:14px}
    .hero h1{font-size:clamp(38px,8vw,68px);line-height:1.05;margin-bottom:18px;letter-spacing:-0.03em;color:var(--white)}
    .hero-body{max-width:680px;color:var(--gray-300);line-height:1.8;font-size:16px}
    .section{padding:60px 40px;border-top:1px solid var(--gray-800);max-width:980px}
    .section h2{font-size:clamp(24px,4vw,34px);color:var(--white);margin-bottom:16px;letter-spacing:-0.02em}
    .section p{color:var(--gray-300);line-height:1.8;max-width:680px}
    .placeholder-note{font-family:var(--font-mono);font-size:13px;color:var(--gray-500);border:1px dashed var(--gray-800);border-radius:8px;padding:24px;margin-top:24px;text-transform:lowercase}
    .back-link{display:inline-block;margin-top:32px;font-family:var(--font-mono);font-size:13px;color:var(--red-400);text-transform:lowercase;transition:color 0.15s ease}
    .back-link:hover{color:var(--red-500)}
    @media(max-width:768px){.hero,.section{padding-left:24px;padding-right:24px}.hero{padding-top:100px}}
  </style>
</head>
