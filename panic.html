<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/tokens.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Panic — New Consensus</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>	<style>

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 40px;
    }

    .kicker {
      font-family: var(--font-mono);
      letter-spacing: 0.18em;
      color: var(--red-400);
      text-transform: uppercase;
      font-size: 12px;
    }

    .num {
      font-family: var(--font-mono);
      font-size: clamp(60px, 14vw, 120px);
      line-height: 1;
      margin: 16px 0;
    }

    .sub {
      color: var(--gray-300);
      max-width: 680px;
      line-height: 1.8;
    }

    a {
      color: var(--purple-300);
    }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="scan-bar"></div>
	<main class="wrap">
		<div>
			<p class="kicker">this is fine</p>
			<div class="num" id="bigCountdown">1,018</div>
			<p class="sub">AI's eating jobs. Climate's eating cities. Fascism's eating democracy. And in <span id="panicDaysInline">1,018</span> days, someone inherits this mess.</p>
			<p><a href="/">Return to homepage →</a></p>
		</div>
	</main>
	<script>
		function getDaysRemaining(){const i=new Date('2029-01-20');i.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return Math.ceil((i-t)/(1000*60*60*24));}
		const d=getDaysRemaining().toLocaleString();document.getElementById('bigCountdown').textContent=d;document.getElementById('panicDaysInline').textContent=d;
	</script>
</body>
</html>
