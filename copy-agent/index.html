<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>New Consensus Copy Agent</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}.wrap{width:100%;max-width:560px}h1{font-size:18px;font-weight:500;margin-bottom:4px}.sub{font-size:13px;color:#666;margin-bottom:24px}.chat{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;min-height:200px;max-height:400px;overflow-y:auto}.msg{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;max-width:85%}.agent{background:#1a1a1a;border:1px solid #2a2a2a;align-self:flex-start}.user{background:#cc0000;align-self:flex-end;border-radius:12px 12px 2px 12px}.ok{background:#0d2e0d;border:1px solid #1a4a1a;align-self:flex-start;font-size:13px}.err{background:#2e0d0d;border:1px solid #4a1a1a;align-self:flex-start;font-size:13px}.row{display:flex;gap:8px}input{width:100%;background:#111;border:1px solid #333;color:#fff;padding:10px 14px;border-radius:8px;font-size:14px;outline:none}input:focus{border-color:#cc0000}button{background:#cc0000;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer}button:hover{background:#aa0000}.sec{background:#222;border:1px solid #333}.sec:hover{background:#333}#login{display:flex;flex-direction:column;gap:12px}#app{display:none;flex-direction:column;gap:12px}.sp{display:inline-block;width:10px;height:10px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px}@keyframes spin{to{transform:rotate(360deg)}}.old{color:#666;text-decoration:line-through;margin-bottom:6px;font-size:13px}.new{color:#4caf50;margin-bottom:10px;font-size:13px}.fl{color:#888;font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}.preview{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:12px;margin-top:6px}.brow{display:flex;gap:8px;margin-top:10px}</style></head><body><div class="wrap"><h1>New Consensus</h1><p class="sub">Copy agent</p><div id="login"><input type="password" id="pwd" placeholder="Password"/><button id="enterbtn">Enter</button></div><div id="app"><div class="chat" id="chat"><div class="msg agent">Hi! Tell me what to change and I will update the site automatically.<br><br><span style="color:#555">Examples: "Change the hero headline to: Three crises. One plan." or "Make the join section more urgent"</span></div></div><div class="row"><input type="text" id="inp" placeholder="What do you want to change?"/><button id="sendbtn">Send</button></div></div></div><script>async function doLogin(){const pwd=document.getElementById('pwd').value;const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'verify',password:pwd})});const d=await r.json();if(d.ok){document.getElementById('login').style.display='none';document.getElementById('app').style.display='flex';}else{document.getElementById('pwd').style.borderColor='#cc0000';}}document.getElementById('enterbtn').addEventListener('click',doLogin);document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});function add(html,cls){const c=document.getElementById('chat');const d=document.createElement('div');d.className='msg '+cls;d.innerHTML=html;c.appendChild(d);c.scrollTop=c.scrollHeight;return d;}async function doSend(){const inp=document.getElementById('inp');const t=inp.value.trim();if(!t)return;inp.value='';add(t,'user');const th=add('<span class=sp></span>thinking...','agent');try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'message',text:t})});const d=await r.json();th.remove();if(d.action==='read'){add('<span class=fl>'+d.field+'</span><br>"'+d.value+'"','agent');}else if(d.action==='clarify'){add(d.explanation,'agent');}else if(d.action==='update'){const enc=encodeURIComponent(d.value);add('<span class=fl>'+d.field+'</span><div class=preview><div class=old>'+(d.old||'')+'</div><div class=new>'+d.value+'</div></div><div class=brow><button class=applybtn data-field="'+d.field+'" data-val="'+enc+'">Apply</button><button class=sec class=discbtn>Discard</button></div>','agent');document.querySelectorAll('.applybtn').forEach(b=>b.addEventListener('click',function(){doApply(this,this.dataset.field,decodeURIComponent(this.dataset.val));}));document.querySelectorAll('.discbtn').forEach(b=>b.addEventListener('click',function(){this.closest('.msg').remove();}));}else{add(JSON.stringify(d),'agent');}}catch(e){th.remove();add('Error: '+e.message,'err');}}document.getElementById('sendbtn').addEventListener('click',doSend);document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter')doSend();});async function doApply(btn,field,value){btn.disabled=true;btn.textContent='pushing...';const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'apply',field,value})});const d=await r.json();btn.closest('.msg').remove();if(d.ok)add('Done. Site updates in ~30 seconds.','ok');else add('Error: '+(d.error||'unknown'),'err');}</script></body></html>
