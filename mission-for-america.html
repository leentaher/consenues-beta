<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission for America — New Consensus</title>
  <meta name="description" content="Mission for America — New Consensus.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;

      --black: #0a0a0a;
      --gray-900: #111111;
      --gray-800: #1a1a1a;
      --gray-700: #222222;
      --gray-600: #333333;
      --gray-500: #505050;
      --gray-400: #707070;
      --gray-300: #909090;
      --gray-200: #a0a0a0;
      --gray-100: #e0e0e0;
      --white: #ffffff;

      --red-500: #e7ff00;
      --red-400: #f7ff70;
      --red-300: #fbff9e;
      --amber-500: #f0a020;

      --transition-fast: 0.15s ease;
      --transition-med: 0.25s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--black);
      color: var(--gray-100);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    @keyframes scanline { 0% { top: -100%; } 100% { top: 100%; } }
    @keyframes flicker { 0%, 95%, 100% { opacity: 1; } 96%, 99% { opacity: 0.85; } 97% { opacity: 0.7; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    .scanlines {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
      pointer-events: none; z-index: 1000;
    }
    .scan-bar {
      position: fixed; left: 0; right: 0; height: 8px;
      background: linear-gradient(transparent, rgba(255,255,255,0.03), transparent);
      animation: scanline 6s linear infinite; pointer-events: none; z-index: 1001;
    }

    .nav-dropdown { position: relative; display: inline-flex; align-items: center; }
    .nav-dropdown-trigger { background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 13px; color: var(--gray-300); text-transform: lowercase; line-height: 1; display: inline-flex; align-items: center; gap: 4px; }
    .nav-dropdown-trigger.active { color: var(--white); }
    .dropdown-arrow { font-size: 10px; }
    .nav-dropdown-menu { position: absolute; top: calc(100% + 8px); left: 0; min-width: 180px; background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 0; opacity: 0; visibility: hidden; }
    .nav-dropdown:hover .nav-dropdown-menu, .nav-dropdown[open] .nav-dropdown-menu { opacity: 1; visibility: visible; }
    .nav-dropdown-item { display: block; padding: 10px 16px; color: #c4b5fd; font-size: 14px; }
    .nav-dropdown-item:hover, .nav-dropdown-item.active { color: #fff; background: rgba(167, 139, 250, 0.08); }

    .hero {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 40px 80px;
      max-width: 900px;
      animation: flicker 5s infinite;
    }

    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--red-300);
      margin-bottom: 20px;
      text-transform: lowercase;
    }

    .hero-headline {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 600;
      color: var(--white);
      line-height: 1.05;
      margin-bottom: 24px;
      letter-spacing: -0.03em;
    }

    .hero-subhead {
      font-family: var(--font-mono);
      font-size: 15px;
      color: var(--gray-200);
      line-height: 1.9;
      max-width: 680px;
      margin-bottom: 40px;
    }

    .section {
      padding: 80px 40px;
      border-top: 1px solid var(--gray-800);
    }

    .section-head {
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 500;
      color: var(--white);
      margin-bottom: 24px;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .section-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--gray-400);
      text-transform: lowercase;
      letter-spacing: 0.03em;
      margin-bottom: 24px;
    }

    .section-body {
      font-size: 16px;
      color: var(--gray-300);
      line-height: 1.8;
      max-width: 900px;
    }

    .footer {
      padding: 60px 40px;
      border-top: 1px solid var(--gray-800);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 40px;
    }

    .footer-brand { max-width: 400px; }
    .footer-logo { font-weight: 600; font-size: 15px; color: var(--white); margin-bottom: 16px; }
    .footer-tagline { font-size: 14px; color: var(--gray-400); line-height: 1.7; }
    .footer-links { display: flex; gap: 32px; flex-wrap: wrap; }
    .footer-link { font-size: 13px; color: var(--gray-400); transition: color var(--transition-fast); }
    .footer-link:hover { color: var(--white); }
    .footer-copy { width: 100%; padding-top: 40px; border-top: 1px solid var(--gray-800); margin-top: 20px; font-size: 12px; color: var(--gray-500); }

    @media (max-width: 768px) {
      .hero { padding: 100px 24px 60px; }
      .section { padding: 60px 24px; }
      .footer { padding: 40px 24px; }
      .footer-links { gap: 16px; }
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="scan-bar"></div>
  <div id="site-header"></div>

  <section class="hero">
    <p class="hero-eyebrow">coming soon</p>
    <h1 class="hero-headline">Mission for America.</h1>
    <p class="hero-subhead">The plan for a sweeping national mobilization to build a new, clean economy that actually provides prosperity for all Americans.</p>
  </section>

  <section class="section">
    <p class="section-meta">status</p>
    <h2 class="section-head">Content coming soon.</h2>
    <div class="section-body">
      <p>This page is a placeholder. The full Mission for America write-up will be added in a forthcoming update.</p>
    </div>
  </section>

  <div id="site-footer"></div>

  <script>
    (function setupNavDropdown() {
      const dropdowns = document.querySelectorAll('.nav-dropdown');
      if (!dropdowns.length) return;

      function isMobile() { return window.innerWidth <= 768; }

      function setOpen(dropdown, open) {
        const trigger = dropdown.querySelector('.nav-dropdown-trigger');
        dropdown.classList.toggle('open', open);
        if (open) { dropdown.setAttribute('open', ''); } else { dropdown.removeAttribute('open'); }
        if (trigger) { trigger.setAttribute('aria-expanded', open ? 'true' : 'false'); }
      }

      function closeAll() { dropdowns.forEach((d) => setOpen(d, false)); }

      dropdowns.forEach((dropdown) => {
        const trigger = dropdown.querySelector('.nav-dropdown-trigger');
        if (!trigger) return;

        trigger.addEventListener('click', (e) => {
          if (isMobile()) { e.preventDefault(); setOpen(dropdown, !dropdown.classList.contains('open')); }
        });
        trigger.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setOpen(dropdown, !dropdown.classList.contains('open')); }
          if (e.key === 'Escape') { setOpen(dropdown, false); trigger.blur(); }
        });
        dropdown.addEventListener('mouseenter', () => { if (!isMobile()) setOpen(dropdown, true); });
        dropdown.addEventListener('mouseleave', () => { if (!isMobile()) setOpen(dropdown, false); });
        dropdown.addEventListener('focusout', (e) => {
          if (!dropdown.contains(e.relatedTarget)) { setOpen(dropdown, false); }
        });
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.nav-dropdown')) { closeAll(); }
      });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAll(); });
    })();
  </script>
  <script src="/shared-layout.js"></script>
</body>
</html>
